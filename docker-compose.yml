version: "3.8"

services:

  db:
    image: postgres:16
    container_name: coupon-db
    restart: always
    environment:
      POSTGRES_DB: coupondb
      POSTGRES_USER: marcin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: coupon-service
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/coupondb
      SPRING_DATASOURCE_USERNAME: marcin
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  pgdata:
